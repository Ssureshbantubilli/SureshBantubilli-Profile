name: update-projects

on:
  schedule:
    # Hourly at :17 past — avoids :00 cron-contention delays on GitHub
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-projects
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render projects section from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/update_projects.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: auto-refresh projects section ($(date -u +%FT%TZ))"
          git push
